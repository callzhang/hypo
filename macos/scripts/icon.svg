<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5EB1FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8458FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lowerLayerGradient" x1="28%" y1="18%" x2="72%" y2="82%">
      <stop offset="0%" style="stop-color:#DCE8FF;stop-opacity:0.24" />
      <stop offset="100%" style="stop-color:#A499FF;stop-opacity:0.10" />
    </linearGradient>
    <linearGradient id="middleLayerGradient" x1="26%" y1="16%" x2="74%" y2="84%">
      <stop offset="0%" style="stop-color:#F5F8FF;stop-opacity:0.42" />
      <stop offset="100%" style="stop-color:#B6ABFF;stop-opacity:0.22" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
      <feOffset dx="0" dy="15" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="#E6EEFF" />

  <g filter="url(#dropShadow)">
    <rect x="250" y="150" width="300" height="300" rx="85" ry="85" fill="url(#bgGradient)" />
    <ellipse cx="400" cy="348" rx="105" ry="42" fill="url(#lowerLayerGradient)" />
    <ellipse cx="400" cy="309" rx="105" ry="42" fill="url(#middleLayerGradient)" />
    <ellipse cx="400" cy="270" rx="105" ry="42" fill="#FFFFFF" />
  </g>
</svg>
